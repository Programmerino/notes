Show":true,"updatedDate":1583335589000,"createdDate":1583327591000,"publishedDate":1583327598000,"published":true,"advertZone({\"version\":2})":"comment_insight/article","sponsorType":null,"writer":"Staff","copyrighted":true,"topics":[{"type":"id","generated":true,"id":"$ROOT_QUERY.content({\"contentType\":\"Article\",\"filter\":{\"entityUuid\":\"a2286738-5dec-11ea-be3e-43af5536d789\",\"applicationId\":\"2695b2c9-96ef-4fe4-96f8-ba20d0a020b3\"}}).topics.0","typename":"Topic"}],"body({\"customContents\":[{\"row\":4,\"type\":\"ad\"},{\"row\":8,\"type\":\"newsletter\"},{\"row\":9,\"type\":\"reading-50-percent-completion-tracker\"},{\"row\":10,\"type\":\"more-on-this\"},{\"row\":13,\"type\":\"ad2\"},{\"row\":6,\"type\":\"outstream-1\"},{\"row\":9999,\"type\":\"reading-100-percent-completion-tracker\"}]})":{"type":"json","json":[{"type":"p","children":[{"type":"em","children":[{"type":"text","data":"The Peloponnesian War"}]},{"type":"text","data":", Thucydides."}]},{"type":"p","children":[{"type":"text","data":"“And the quarrel, though least in speech, I conceive to be the growth of the Athenian power, which putting the Lacedaemonians into fear necessitated the war.” (Thomas Hobbes’ translation)."}]},{"type":"p","children":[{"type":"text","data":"“The real cause I consider to be the one which was formally most kept out of sight. The growth of the power of Athens, and the alarm which this inspired in Lacedaemon, made war inevitable.” (Richard Crawley’s translation)."}]},{"type":"p","children":[{"type":"text","data":"This famous passage is the main source for what famed Harvard political scientist Graham Allison calls the “Thucydides trap” into which he argues China and the United States are inadvertently drifting. “When one great power threatens to displace another, war is almost always the result,” Allison wrote."}]},{"type":"ad"},{"type":"p","children":[{"type":"text","data":"What fascinates me is that Silicon Valley seems to have suddenly discovered the Thucydides trap. Writing in "},{"type":"em","children":[{"type":"text","data":"The New York Times"}]},{"type":"text","data":" last week, Eric Schmidt, former head of Google and now a senior tech adviser to the Pentagon, warns America may be falling behind China."}]},{"type":"h3","children":[{"type":"a","attribs":{"href":"https://www.scmp.com/news/china/article/3051226/us-sets-sights-harvard-professor-and-universities-over-chinese-funding","target":"_self"},"children":[{"type":"text","data":"US moves in on top universities over fear of Chinese funding, IP leaks"}]}]},{"type":"p","children":[{"type":"text","data":"“Now we are in a technology competition with China that has profound ramifications for our economy and defence,” he wrote. “Important trends are not in our favour … The government needs to get back in the game in a serious way.”"}]},{"type":"outstream-1"},{"type":"p","children":[{"type":"text","data":"And, speaking at the Air Warfare Symposium in Orlando, Florida, also last week, Tesla and SpaceX CEO Elon Musk practically said war was coming. “The foundation of war is economics,” he said. “The Chinese economy is probably going to be at least twice as big as the United States’ economy, maybe three times.”"}]},{"type":"newsletter"},{"type":"p","children":[{"type":"text","data":"What these tech titans make clear is that competition and war will not be just over sea lanes and territories, but it’s really over technology. The bitter fight between Beijing and Washington over Huawei and 5G is just a foretaste of things to come. That’s also why US security agencies are prosecuting a McCarthyite campaign against ethnic Chinese scientists and engineers in the US as well as others with tech or industry ties with China."}]},{"type":"reading-50-percent-completion-tracker"},{"type":"p","children":[{"type":"text","data":"What is truly disconcerting is that ancient wisdom and Silicon Valley foresight are agreeing on the high probability of the contest leading to war. President Xi Jinping once said avoiding war was the supreme responsibility of both countries."}]},{"type":"more-on-this"},{"type":"p","children":[{"type":"text","data":"But a main theme of Greek tragedies is that the hero can’t avoid his fate even if he knew about it from the start. And yes, Thucydides’ text is a historical tragedy."}]},{"type":"reading-100-percent-completion-tracker"}]},"sections":[[{"type":"id","generated":true,"id":"$ROOT_QUERY.content({\"contentType\":\"Article\",\"filter\":{\"entityUuid\":\"a2286738-5dec-11ea-be3e-43af5536d789\",\"applicationId\":\"2695b2c9-96ef-4fe4-96f8-ba20d0a020b3\"}}).sections.0.0","typename":"Section"},{"type":"id","generated":true,"id":"$ROOT_QUERY.content({\"contentType\":\"Article\",\"filter\":{\"entityUuid\":\"a2286738-5dec-11ea-be3e-43af5536d789\",\"applicationId\":\"2695b2c9-96ef-4fe4-96f8-ba20d0a020b3\"}}).sections.0.1","typename":"Section"}]],"authors":[{"type":"id","generated":true,"id":"$ROOT_QUERY.content({\"contentType\":\"Article\",\"filter\":{\"entityUuid\":\"a2286738-5dec-11ea-be3e-43af5536d789\",\"applicationId\":\"2695b2c9-96ef-4fe4-96f8-ba20d0a020b3\"}}).authors.0","typename":"Author"}],"images({\"filter\":{\"type\":{\"values\":\"COVER\"}}})":[],"images({\"filter\":{\"type\":{\"values\":\"COVER_MOBILE\"}}})":[],"images":[{"type":"id","generated":true,"id":"$ROOT_QUERY.content({\"contentType\":\"Article\",\"filter\":{\"entityUuid\":\"a2286738-5dec-11ea-be3e-43af5536d789\",\"applicationId\":\"2695b2c9-96ef-4fe4-96f8-ba20d0a020b3\"}}).images.0","typename":"Image"}],"relatedNewsletters":[],"moreOnThisArticles":[],"__typename":"Article"},"$ROOT_QUERY.content({\"contentType\":\"Article\",\"filter\":{\"entityUuid\":\"a2286738-5dec-11ea-be3e-43af5536d789\",\"applicationId\":\"2695b2c9-96ef-4fe4-96f8-ba20d0a020b3\"}}).types.0.0":{"entityId":"783","entityUuid":"012d7708-2959-4b2b-9031-23e3d025a08d","name":"Column","urlAlias":"/article-type/column","__typename":"ArticleType"},"$ROOT_QUERY.content({\"contentType\":\"Article\",\"filter\":

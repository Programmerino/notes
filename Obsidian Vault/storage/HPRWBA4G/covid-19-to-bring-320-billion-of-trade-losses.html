ata-network-name="linkedin" data-share-title="COVID-19 to bring $320 billion of trade losses" data-share-url="https://safety4sea.com/covid-19-to-bring-320-billion-of-trade-losses/"> <span class="et-extra-icon et-extra-icon-linkedin et-extra-icon-background-hover"></span> </a><a href="#" class="social-share-link" title="Share &quot;COVID-19 to bring $320 billion of trade losses&quot; via Email" data-network-name="basic_email" data-share-title="COVID-19 to bring $320 billion of trade losses" data-share-url="https://safety4sea.com/covid-19-to-bring-320-billion-of-trade-losses/"> <span class="et-extra-icon et-extra-icon-basic_email et-extra-icon-background-hover"></span> </a></div></div><div class="post-header"><h1 class="entry-title">COVID-19 to bring $320 billion of trade losses</h1><div class="excerpt"><h4>In light of the ongoing <a href="https://safety4sea.com/live-map-depicts-spread-of-coronavirus/" target="_blank" rel="noopener noreferrer">coronavirus crisis</a>,
 Allianz issued a research considering that the disease will bring 
greater impacts, worst than those of the US-China trade war. In fact, 
the research reveals that the losses of trade in good and services may 
amount $320 billion per quarter following the business disruption.</h4></div><div class="post-meta vcard"><p></p><p class="my-custom-meta"> <a href="https://safety4sea.com/category/others/finance/" style="color:#606060;">Finance</a><span class="themetav"> | 09/03/20</span></p></div></div><div class="post-wrap"><div class="post-content entry-content"><p>Specifically, researchers expect that the <a href="https://safety4sea.com/12-covid-19-cases-reported-on-nile-river-cruise-vessel/" target="_blank" rel="noopener noreferrer">COVID-19</a>
 outbreak will act as a major trade barrier in 2020. According to their 
calculations, the restriction measures against the disease, are already 
equivalent to +0.7pp of additional tariffs on goods, bringing the world 
tariff average to a notional 6.5% at end of Q1 2020.</p><p>That means 
that, in one quarter, the global trade has already suffered from the 
equivalent of the full-year trade war between the U.S. and China in 
2019.</p><div id="attachment_21220321" style="width: 591px" class="wp-caption aligncenter"><img aria-describedby="caption-attachment-21220321" alt="" data-srcset="https://safety4sea.com/wp-content/uploads/2020/03/coronavirus-report-trade-market-1.png 761w, https://safety4sea.com/wp-content/uploads/2020/03/coronavirus-report-trade-market-1-300x175.png 300w" sizes="(max-width: 581px) 100vw, 581px" data-src="https://safety4sea.com/wp-content/uploads/2020/03/coronavirus-report-trade-market-1.png" class="wp-image-21220321  lazyload" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="581" height="339"><noscript><img aria-describedby="caption-attachment-21220321" class="wp-image-21220321 " src="https://safety4sea.com/wp-content/uploads/2020/03/coronavirus-report-trade-market-1.png" alt="" width="581" height="339" srcset="https://safety4sea.com/wp-content/uploads/2020/03/coronavirus-report-trade-market-1.png 761w, https://safety4sea.com/wp-content/uploads/2020/03/coronavirus-report-trade-market-1-300x175.png 300w" sizes="(max-width: 581px) 100vw, 581px" /></noscript><p id="caption-attachment-21220321" class="wp-caption-text">Credit: Allianz Research</p></div><blockquote><span class="open-quote thisi"></span>Each
 quarter of Covid-19 related trade losses in 2020 is thus comparable to 
the annual impact of the U.S.-China trade dispute on world tariffs in 
2019. We expect the resumption of business activity to be gradual in 
March and April and reach full speed by the end of May.<span class="close-quote"></span></blockquote><p>...As researchers noted.</p><p>At
 the same time, export losses are estimated to come at the total amount 
of $161bn, since demand from China and Europe will remain remarkably 
affected by the end of April.</p><p>A drop in the tourist industry is 
also expected to be seen. Tourist from and to China, Italy and 
intra-Europe countries, will mark a slowdown in transport services.</p><blockquote><span class="open-quote thisi"></span>The
 return to normal levels of activity is expected to be very gradual, 
pushing global export losses to USD 125bn on the tourism side and 
USD33bn for transport services.<span class="close-quote"></span></blockquote><p>...Researchers continued.</p><p>The shock that trade market is going through due to the <a href="https://safety4sea.com/coronavirus-negatively-impacts-indian-shipping-and-ports/" target="_blank" rel="noopener noreferrer">coronavirus crisis,</a>
 is already visible in early trade indicators, which signal a trade 
recession in volume terms both in Q1 (-2.5% q/q annualized) and Q2 (-1%)
 2020.</p><div class="a-single a-313"><a onclick="gtag('event', 'click', {'event_category': 'Adverts', 'event_label': 'Coronavirus Contingency Plan 620x160', 'value': 1.00,  'non_interaction': true});" href="https://sqemarine.com/product/coronavirus-contingency-plan/?utm_source=safety4sea&amp;utm_medium=banner&amp;utm_campaign=coronavirus-contingency-plan" target="_blank"><img onload="gtag('event', 'impression', {'event_category': 'Adverts', 'event_label': 'Coronavirus Contingency Plan 620x160', 'value': 2.00, 'non_interaction': true});" data-src="https://safety4sea.com/wp-content/uploads/2020/02/Coronavirus-Contingency-Plan-620x160-Banner-2020_02-01.jpg" class="lazyload" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw=="><noscript><img onload="gtag('event', 'impression', {'event_category': 'Adverts', 'event_label': 'Coronavirus Contingency Plan 620x160', 'value': 2.00, 'non_interaction': true});" src="https://safety4sea.com/wp-content/uploads/2020/02/Coronavirus-Contingency-Plan-620x160-Banner-2020_02-01.jpg" /></noscript></a></div><p>As
 the International Chamber of Shipping forecasts, COVID-19 has removed 
more than 350.000 containers from global trade. Specifically, there have
 been marked 49% fewer container sailing operations from China in the 
last four weeks.</p><p>The forecasted drop of 20-25% in global shipping 
industry throughput will have a corresponding impact on the port 
terminal industry as well.</p><p>Explore more herebelow</p><div id="attachment_21220325" style="width: 220px" class="wp-caption alignleft"><a href="https://safety4sea.com/wp-content/uploads/2020/03/Allianz-COVID-19-to-cost-320-billio-of-trade-losses-every-quarter-2020_03.pdf" target="_blank" rel="noopener noreferrer"><img aria-describedby="caption-attachment-21220325" alt="" data-srcset="https://safety4sea.com/wp-content/uploads/2020/03/allianz-report-front-page-pdf-210x300.png 210w, https://safety4sea.com/wp-content/uploads/2020/03/allianz-report-front-page-pdf.png 524w" sizes="(max-width: 210px) 100vw, 210px" data-src="https://safety4sea.com/wp-content/uploads/2020/03/allianz-report-front-page-pdf-210x300.png" class="wp-image-21220325 size-medium lazyload" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="210" height="300"><noscript><img aria-describedby="caption-attachment-21220325" class="wp-image-21220325 size-medium" src="https://safety4sea.com/wp-content/uploads/2020/03/allianz-report-front-page-pdf-210x300.png" alt="" width="210" height="300" srcset="https://safety4sea.com/wp-content/uploads/2020/03/allianz-report-front-page-pdf-210x300.png 210w, https://safety4sea.com/wp-content/uploads/2020/03/allianz-report-front-page-pdf.png 524w" sizes="(max-width: 210px) 100vw, 210px" /></noscript></a><p id="caption-attachment-21220325" class="wp-caption-text">"COVID-19 to cost $320 billion of trade losses every quarter"</p></div><p>&nbsp;</p><p>&nbsp;</p><div class="g g-20"><div class="g-col b-20 a-112"><a onclick="gtag('event', 'click', {'event_category': 'Adverts', 'event_label': 'Noon Report Subscribe 300 x 60', 'value': 1.00,  'non_interaction': true});" href="http://www.safety4sea.com/mailing-lists/" target="_blank" rel="nofollow"><img onload="gtag('event', 'impression', {'event_category': 'Adverts', 'event_label': 'Noon Report Subscribe 300 x 60', 'value': 2.00, 'non_interaction': true});" data-src="https://safety4sea.com/wp
